# ============================================================
# 弥娅 QQ 功能配置
# 参考 Undefined 项目设计，符合弥娅系统架构
# ============================================================

# 消息解析配置
message_parsing:
  # 是否启用引用消息解析
  enable_reply_parsing: true
  # 是否启用文件消息解析
  enable_file_parsing: true
  # 是否启用多媒体检测
  enable_media_detection: true
  # 是否在文本中显示引用/文件占位符
  show_placeholder_in_text: true

# 图片处理配置
image:
  # 是否启用图片分析
  enable_analysis: true
  # 是否启用OCR文字识别
  enable_ocr: true
  # 图片分析超时时间（秒）
  analysis_timeout: 30
  # 是否缓存分析结果
  cache_enabled: true
  # 缓存过期时间（小时）
  cache_expire_hours: 24

# 语音处理配置
voice:
  # 是否启用语音消息处理
  enable_processing: false
  # 语音转文字（需要额外API）
  enable_stt: false

# 文件处理配置  
file:
  # 是否启用文件下载
  enable_download: false
  # 最大文件大小（MB）
  max_file_size: 10
  # 支持的文件类型
  allowed_types:
    - txt
    - pdf
    - doc
    - docx
    - xls
    - xlsx
    - ppt
    - pptx
    - md
    - json

# 合并转发配置
forward:
  # 是否启用合并转发解析
  enable_parsing: true
  # 最大展开层数
  max_expand_depth: 3

# 功能开关
features:
  # 戳一戳回复
  poke_reply: true
  # 表情包请求
  emoji_request: true
  # 欢迎新成员
  welcome_new_member: false
  # 定时任务
  scheduled_tasks: true
  # 被动聊天（关键词触发）
  passive_chat: true
  # 主动聊天
  active_chat: true

# 日志配置
logging:
  # 是否记录消息详情
  log_message_detail: false
  # 是否记录调试信息
  debug: false
  # 日志保留天数
  retention_days: 7