# 弥娅统一模型池配置
# 版本: 1.0.0
# 最后更新: 2025-03-21
# 
# 设计目标:
# 1. 所有端共享同一个模型池 (QQ、终端、Web等)
# 2. 支持文本和视觉模型
# 3. 统一的API密钥管理
# 4. 智能模型选择和路由

# ========================================
# 模型池配置
# ========================================

models:
  # ========================================
  # 文本大语言模型
  # ========================================
  
  # DeepSeek 官方模型
  deepseek_v3_official:
    name: "deepseek-chat"
    type: "text"  # text, vision, ocr, multimodal
    provider: "openai"
    base_url: "${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}"
    api_key: "${DEEPSEEK_API_KEY}"
    description: "DeepSeek V3 官方 - 快速响应的通用模型"
    capabilities:
      - "simple_chat"
      - "chinese_understanding"
      - "tool_calling"
      - "multimodal"  # 支持图片输入
    cost_per_1k_tokens:
      input: 0.00014
      output: 0.00028
    latency: "fast"
    quality: "excellent"
    max_tokens: 128000
    
  deepseek_r1_official:
    name: "deepseek-reasoner"
    type: "text"
    provider: "openai"
    base_url: "${DEEPSEEK_API_BASE:-https://api.deepseek.com/v1}"
    api_key: "${DEEPSEEK_API_KEY}"
    description: "DeepSeek R1 官方 - 深度推理模型"
    capabilities:
      - "complex_reasoning"
      - "code_analysis"
      - "creative_writing"
      - "task_planning"
    cost_per_1k_tokens:
      input: 0.00028
      output: 0.00056
    latency: "medium"
    quality: "excellent"
    max_tokens: 128000
  
  # 硅基流动模型（成本最低，优先使用）
  siliconflow_qwen_7b:
    name: "${SILICONFLOW_QWEN_7B_MODEL:-Qwen/Qwen2.5-7B-Instruct}"
    type: "text"
    provider: "openai"
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    api_key: "${SILICONFLOW_API_KEY}"
    description: "Qwen 2.5 7B - 快速通用模型（硅基流动，免费）"
    capabilities:
      - "simple_chat"
      - "chinese_understanding"
      - "summarization"
      - "task_classification"
    cost_per_1k_tokens:
      input: 0.0001
      output: 0.0002
    latency: "fast"
    quality: "good"
    max_tokens: 32768
    priority: 1.0  # 最高优先级（成本最低）
  
  siliconflow_qwen_72b:
    name: "${SILICONFLOW_QWEN_72B_MODEL:-Qwen/Qwen2.5-72B-Instruct}"
    type: "text"
    provider: "openai"
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    api_key: "${SILICONFLOW_API_KEY}"
    description: "Qwen 2.5 72B - 高性能通用模型（硅基流动）"
    capabilities:
      - "complex_reasoning"
      - "chinese_understanding"
      - "creative_writing"
      - "tool_calling"
    cost_per_1k_tokens:
      input: 0.0015
      output: 0.0020
    latency: "medium"
    quality: "excellent"
    max_tokens: 32768
    priority: 0.7
  
  siliconflow_glm_4:
    name: "${SILICONFLOW_GLM_4_MODEL:-THUDM/glm-4-9b-chat}"
    type: "text"
    provider: "openai"
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    api_key: "${SILICONFLOW_API_KEY}"
    description: "GLM-4 9B - 清华智谱（代码能力强，硅基流动）"
    capabilities:
      - "code_generation"
      - "code_analysis"
      - "chinese_understanding"
      - "simple_chat"
    cost_per_1k_tokens:
      input: 0.00015
      output: 0.00030
    latency: "fast"
    quality: "excellent"
    max_tokens: 32768
    priority: 0.8
  
  
  # 智谱AI模型（中文优化）
  zhipu_glm_4:
    name: "${ZHIPU_GLM_4_MODEL:-glm-4}"
    type: "text"
    provider: "zhipu"
    base_url: "${ZHIPU_API_BASE:-https://open.bigmodel.cn/api/paas/v4}"
    api_key: "${ZHIPU_API_KEY}"
    description: "GLM-4 - 智谱标准模型（中文优化）"
    capabilities:
      - "chinese_understanding"
      - "code_generation"
      - "creative_writing"
      - "text_generation"
    cost_per_1k_tokens:
      input: 0.0010
      output: 0.0020
    latency: "fast"
    quality: "excellent"
    max_tokens: 32768
    priority: 0.8
  
  zhipu_glm_4_plus:
    name: "${ZHIPU_GLM_4_PLUS_MODEL:-glm-4-plus}"
    type: "text"
    provider: "zhipu"
    base_url: "${ZHIPU_API_BASE:-https://open.bigmodel.cn/api/paas/v4}"
    api_key: "${ZHIPU_API_KEY}"
    description: "GLM-4 Plus - 智谱增强模型（长上下文）"
    capabilities:
      - "long_context_understanding"
      - "complex_reasoning"
      - "document_analysis"
      - "chinese_understanding"
    cost_per_1k_tokens:
      input: 0.0014
      output: 0.0028
    latency: "medium"
    quality: "outstanding"
    max_tokens: 128000
    priority: 0.7
  
  zhipu_glm_4v:
    name: "${ZHIPU_GLM_4V_MODEL:-glm-4v}"
    type: "vision"
    provider: "zhipu"
    base_url: "${ZHIPU_API_BASE:-https://open.bigmodel.cn/api/paas/v4}"
    api_key: "${ZHIPU_API_KEY}"
    description: "GLM-4V - 智谱多模态模型（图片理解）"
    capabilities:
      - "image_description"
      - "visual_qa"
      - "document_understanding"
      - "image_analysis"
    cost_per_1k_tokens:
      input: 0.0020
      output: 0.0040
    max_image_size: "10MB"
    priority: 0.8
  
  zhipu_glm_46v_flash:
    name: "${ZHIPU_GLM_46V_FLASH_MODEL:-glm-4.6v-flash}"
    type: "vision"
    provider: "zhipu"
    base_url: "${ZHIPU_API_BASE:-https://open.bigmodel.cn/api/paas/v4}"
    api_key: "${ZHIPU_API_KEY}"
    description: "GLM-4.6V-Flash - 智谱最新免费多模态模型（高性价比）"
    capabilities:
      - "image_description"
      - "visual_qa"
      - "document_understanding"
      - "image_analysis"
      - "real_time_analysis"
    cost_per_1k_tokens:
      input: 0.0  # 免费！
      output: 0.0  # 免费！
    max_image_size: "20MB"
    priority: 1.0  # 最高优先级（免费）
  
  # ========================================
  # 视觉模型 (新增)
  # ========================================
  
  # OCR模型
  paddleocr:
    name: "paddleocr"
    type: "ocr"
    provider: "local"  # 本地运行
    description: "百度PaddleOCR - 高性能中文OCR"
    capabilities:
      - "text_extraction"
      - "chinese_ocr"
      - "english_ocr"
      - "layout_analysis"
    languages:
      - "ch"
      - "en"
    use_gpu: false
    gpu_memory_mb: 2048
    timeout_seconds: 30
    
  tesseract:
    name: "tesseract"
    type: "ocr"
    provider: "local"
    description: "Google Tesseract OCR - 多语言OCR"
    capabilities:
      - "text_extraction"
      - "multilingual_ocr"
    languages:
      - "chi_sim"
      - "eng"
      - "jpn"
      - "kor"
    data_path: "/usr/share/tesseract-ocr/4.00/tessdata"
    timeout_seconds: 30
  
  # 视觉大语言模型
  gpt_4v:
    name: "gpt-4-vision-preview"
    type: "vision"
    provider: "openai"
    base_url: "${OPENAI_API_BASE:-https://api.openai.com/v1}"
    api_key: "${OPENAI_API_KEY}"
    description: "GPT-4 Vision - OpenAI多模态视觉模型"
    capabilities:
      - "image_description"
      - "visual_qa"
      - "object_detection"
      - "text_in_images"
    cost_per_1k_tokens:
      input: 0.01
      output: 0.03
    max_image_size: "20MB"
    supported_formats:
      - "png"
      - "jpg"
      - "jpeg"
      - "gif"
      - "webp"
    
  siliconflow_qwen_vl:
    name: "Qwen/Qwen2.5-VL-72B-Instruct"
    type: "vision"
    provider: "openai"
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    api_key: "${SILICONFLOW_API_KEY}"
    description: "Qwen2.5-VL 72B - 通义千问视觉语言大模型（硅基流动）"
    capabilities:
      - "image_description"
      - "visual_qa"
      - "chinese_understanding"
      - "image_analysis"
    cost_per_1k_tokens:
      input: 0.0008
      output: 0.0016
    max_image_size: "10MB"
    priority: 0.95
    
  minicpm_v:
    name: "openbmb/MiniCPM-V-2_6"
    type: "vision"
    provider: "openai"
    base_url: "${SILICONFLOW_BASE_URL:-https://api.siliconflow.cn/v1}"
    api_key: "${SILICONFLOW_API_KEY}"
    description: "MiniCPM-V 2.6 - 轻量级视觉语言模型"
    capabilities:
      - "image_description"
      - "visual_qa"
      - "document_understanding"
    cost_per_1k_tokens:
      input: 0.00015
      output: 0.0003
    max_image_size: "5MB"
  
  # 安全检测模型
  nsfw_detector:
    name: "nsfw-detector"
    type: "safety"
    provider: "local"
    description: "NSFW内容检测模型"
    capabilities:
      - "nsfw_detection"
      - "explicit_content"
    model_path: "./models/nsfw_detector"
    confidence_threshold: 0.7
    
  content_safety:
    name: "content-safety"
    type: "safety"
    provider: "local"
    description: "内容安全分析模型"
    capabilities:
      - "violence_detection"
      - "hate_speech"
      - "self_harm"
    model_path: "./models/content_safety"

# ========================================
# 模型路由配置
# ========================================

model_routing:
  # 任务类型到模型的映射
  tasks:
    # 文本任务
    simple_chat:
      primary: "siliconflow_qwen_72b"      # 高性能通用模型（硅基流动）
      secondary: "siliconflow_glm_4"       # 代码能力强（硅基流动）
      fallback: "zhipu_glm_4"              # 智谱模型备用
      cost_priority: 0.8
      speed_priority: 0.9
      quality_priority: 0.9
      
    complex_reasoning:
      primary: "siliconflow_qwen_72b"      # 高性能通用（硅基流动，稳定）
      secondary: "zhipu_glm_4_plus"        # 长上下文支持（智谱）
      fallback: "siliconflow_glm_4"        # 代码能力强（硅基流动）
      cost_priority: 0.7
      speed_priority: 0.8
      quality_priority: 0.9
      
    code_generation:
      primary: "siliconflow_glm_4"        # GLM-4 代码能力强
      secondary: "siliconflow_qwen_7b"     # 成本最低
      fallback: "zhipu_glm_4"             # 智谱模型备用
      cost_priority: 0.9
      speed_priority: 0.9
      quality_priority: 0.8
    
    # 视觉任务
    text_extraction:
      primary: "paddleocr"
      secondary: "tesseract"
      fallback: "gpt_4v"
      cost_priority: 1.0  # 本地模型成本最低
      speed_priority: 0.9
      quality_priority: 0.8
      
    image_description:
      primary: "siliconflow_qwen_vl"      # Qwen视觉模型（硅基流动，免费额度充足）
      secondary: "zhipu_glm_46v_flash"   # GLM-4.6V-Flash（智谱免费，但有速率限制）
      fallback: "minicpm_v"               # MiniCPM-V（本地部署选项）
      cost_priority: 1.0
      speed_priority: 0.9
      quality_priority: 0.8
      
    nsfw_detection:
      primary: "nsfw_detector"
      secondary: "content_safety"
      fallback: "gpt_4v"  # 使用GPT-4V作为后备
      cost_priority: 1.0
      speed_priority: 0.9
      quality_priority: 0.8
  
  # 端特定模型配置
  endpoints:
    qq:
      # QQ端使用的模型
      enabled_models:
        - "siliconflow_qwen_7b"      # 通用聊天，成本最低
        - "siliconflow_glm_4"        # 代码分析
        - "deepseek_v3_official"     # 性能优秀
        - "zhipu_glm_4"              # 中文聊天优化
        - "paddleocr"                # OCR
        - "tesseract"                # 多语言OCR
        - "zhipu_glm_46v_flash"      # GLM-4.6V-Flash（免费多模态）
        - "zhipu_glm_4v"             # GLM-4V（备选多模态）
        - "qwen_vl"                  # 备选视觉模型
        - "nsfw_detector"            # 安全检测
      
      # 默认模型配置
      defaults:
        chat: "siliconflow_qwen_7b"  # 优先使用硅基流动（成本最低）
        code_analysis: "siliconflow_glm_4"  # GLM-4代码能力强
        ocr: "paddleocr"             # 中文OCR
        image_analysis: "zhipu_glm_46v_flash"  # GLM-4.6V-Flash（免费）
        safety_check: "nsfw_detector"  # 安全检测
        
    terminal:
      enabled_models:
        - "siliconflow_qwen_7b"      # 快速响应
        - "siliconflow_glm_4"        # 代码分析
        - "deepseek_v3_official"     # 复杂任务
      
      defaults:
        chat: "siliconflow_qwen_7b"  # 成本最低
        code_analysis: "siliconflow_glm_4"  # 代码能力强
        
    web:
      enabled_models:
        - "siliconflow_qwen_7b"      # 基础聊天
        - "siliconflow_qwen_72b"     # 高性能任务
        - "zhipu_glm_4_plus"         # 长上下文处理
        - "zhipu_glm_4v"             # 多模态支持
      
      defaults:
        chat: "siliconflow_qwen_7b"  # 成本最低
        multimodal: "zhipu_glm_4v"   # 智谱多模态

# ========================================
# 预算控制
# ========================================

budget_control:
  daily_budget_usd: 10.0
  monthly_budget_usd: 300.0
  alert_threshold: 0.8
  stop_threshold: 0.95
  
  # 各模型预算分配（美元/天）
  model_budgets:
    # 硅基流动模型（成本低，预算充足）
    siliconflow_qwen_7b: 2.0      # 大量使用，免费额度充足
    siliconflow_qwen_72b: 1.5     # 高性能任务
    siliconflow_glm_4: 1.0        # 代码相关任务
    
    # DeepSeek官方模型
    deepseek_v3_official: 2.0     # 通用高性能
    deepseek_r1_official: 1.0     # 推理专用
    
    # 智谱AI模型
    zhipu_glm_4: 1.5             # 中文优化任务
    zhipu_glm_4_plus: 1.0        # 长上下文任务
    zhipu_glm_4v: 1.0            # 多模态任务
    zhipu_glm_46v_flash: 0.0     # 免费模型，预算为0

# ========================================
# 性能设置
# ========================================

performance_settings:
  enable_caching: true
  cache_ttl_seconds: 3600
  enable_parallel_execution: true
  max_parallel_models: 3
  consensus_threshold: 0.7
  
  # 连接设置
  connection:
    timeout_seconds: 30
    max_retries: 3
    retry_delay_base: 1.0
    retry_backoff_factor: 2.0
    
  # 模型加载设置
  model_loading:
    preload_local_models: true
    lazy_loading: true
    max_loaded_models: 5

# ========================================
# 监控和日志
# ========================================

monitoring:
  log_level: "INFO"
  log_file: "./logs/model_pool.log"
  metrics_enabled: true
  metrics_interval_seconds: 60
  
  # 监控指标
  metrics:
    - "model_usage"
    - "response_times"
    - "error_rates"
    - "cost_tracking"
    - "cache_hit_rate"
    
  # 告警设置
  alerts:
    high_cost_alert: true
    error_rate_alert: true
    timeout_alert: true
    budget_exceeded_alert: true