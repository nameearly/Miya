# 弥娅统一模型池配置
# 版本: 2.0.0
# 
# 设计目标:
# 1. 所有端共享同一个模型池 (QQ、终端、Web等)
# 2. 模型定义在 multi_model_config.json（包含API密钥）
# 3. 本文件只定义任务路由和端点配置
# 4. 智能模型选择和路由

model_routing:
  # 任务类型到模型的映射
  tasks:
    # 文本任务
    simple_chat:
      primary: "qwen_7b"
      secondary: "qwen_72b"
      fallback: "glm_4_9b"
      
    complex_reasoning:
      primary: "glm_4_9b"
      secondary: "qwen_7b"
      fallback: "qwen_72b"
      
    code_generation:
      primary: "glm_4_9b"
      secondary: "qwen_72b"
      fallback: "qwen_7b"
    
    tool_calling:
      primary: "qwen_72b"
      secondary: "qwen_72b"
      fallback: "glm_4_9b"
      
    creative_writing:
      primary: "glm_4_9b"
      secondary: "qwen_72b"
      fallback: "glm_4_9b"
      
    # 视觉任务
    text_extraction:
      primary: "glm_4_9b"
      secondary: "qwen_72b"
      fallback: "qwen_7b"
      
    image_description:
      primary: "glm_4_9b"
      secondary: "qwen_72b"
      fallback: "qwen_7b"
      
    nsfw_detection:
      primary: "qwen_7b"
      secondary: "glm_4_9b"
      fallback: "qwen_72b"
  
  # 端特定模型配置
  endpoints:
    qq:
      enabled_models:
        - "qwen_7b"
        - "qwen_72b"
        - "glm_4_9b"
        - "llama_3_1_8b"
        - "gemma_2_9b"
        - "paddleocr"
        - "tesseract"
      
      defaults:
        chat: "qwen_7b"
        code_analysis: "glm_4_9b"
        ocr: "paddleocr"
        image_analysis: "glm_4_9b"
        
    terminal:
      enabled_models:
        - "qwen_7b"
        - "glm_4_9b"
        - "qwen_72b"
      
      defaults:
        chat: "qwen_7b"
        code_analysis: "glm_4_9b"
        
    web:
      enabled_models:
        - "qwen_7b"
        - "qwen_72b"
        - "glm_4_9b"
        - "qwen_72b"

      defaults:
        chat: "qwen_7b"
        multimodal: "glm_4_9b"
