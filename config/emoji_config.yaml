# 表情包配置文件
emoji:
  # 基础配置
  enabled: true
  auto_respond: true
  random_emoji_probability: 0.3  # 随机发送表情的概率
  
  # 资源路径配置
  resources:
    emoji_dir: "data/emoji"
    stickers_dir: "data/stickers"
    backup_dir: "data/.emoji_backups"
    
    # 支持的文件格式
    allowed_formats: [".gif", ".jpg", ".jpeg", ".png", ".webp", ".bmp"]
    
    # 文件大小限制（单位：字节）
    max_file_size: 5242880  # 5MB
    
    # 缓存配置
    cache_size_mb: 100
    cache_ttl_hours: 24
    
  # 表情包分类配置
  categories:
    # QQ标准表情（内置）
    qq_standard:
      enabled: true
      type: "builtin"
      description: "QQ内置标准表情"
      
    # 自定义表情
    custom:
      enabled: true
      type: "image"
      dir: "custom"
      description: "用户自定义表情包"
      max_files: 100
      
    # 弥娅专属表情
    miya_special:
      enabled: true
      type: "image"
      dir: "miya_special"
      description: "弥娅专属表情包"
      max_files: 50
      
  # 贴纸分类配置
  stickers:
    cute:
      enabled: true
      dir: "cute"
      description: "可爱贴纸"
      max_files: 50
      
    reaction:
      enabled: true
      dir: "reaction"
      description: "反应贴纸"
      max_files: 30
      
    seasonal:
      enabled: true
      dir: "seasonal"
      description: "节日季节性贴纸"
      max_files: 20
      
    memes:
      enabled: true
      dir: "memes"
      description: "梗图/表情包"
      max_files: 40
      
  # 发送策略
  sending_strategy:
    # 上下文触发
    context_based: true
    context_triggers:
      - pattern: "高兴|开心|哈哈|笑死"
        category: "custom"
        weight: 0.8
        
      - pattern: "难过|伤心|哭"
        category: "reaction"
        weight: 0.7
        
      - pattern: "生气|愤怒|气死"
        category: "custom"
        weight: 0.6
        
      - pattern: "爱你|喜欢|么么哒"
        category: "cute"
        weight: 0.9
        
    # 随机触发
    random_enabled: true
    random_interval_minutes: 30
    random_max_per_day: 10
    
  # 性能配置
  performance:
    max_concurrent_uploads: 3
    upload_timeout_seconds: 30
    image_compression_enabled: true
    compression_quality: 85
    
  # 访问控制
  access_control:
    allow_user_upload: true
    max_user_upload_size_mb: 5
    allowed_upload_groups: []  # 空数组表示所有群组
    allowed_upload_users: []   # 空数组表示所有用户
    
  # 自动保存用户表情包配置 (V2.0.2新增)
  auto_save_user_emojis:
    enabled: true  # 是否启用自动保存功能
    save_category: "user_uploaded"  # 保存到的分类
    max_user_uploads_per_user: 50  # 每个用户最大保存数量
    min_image_size_kb: 10  # 最小图片大小 (KB)
    max_image_size_kb: 5120  # 最大图片大小 (KB，5MB)
    
    # 智能过滤配置
    smart_filtering:
      enabled: true
      min_width: 50  # 最小宽度 (像素)
      min_height: 50  # 最小高度 (像素)
      max_aspect_ratio: 4.0  # 最大宽高比
      min_aspect_ratio: 0.25  # 最小宽高比
      allow_animated: true  # 是否允许GIF动图
      
    # 重复检测配置
    duplicate_detection:
      enabled: true
      similarity_threshold: 0.95  # 相似度阈值，0.95表示95%相似度认为是重复
      hash_method: "md5"  # 哈希方法：md5, sha256, perceptual_hash
      
    # 命名策略
    naming_strategy:
      method: "timestamp_user"  # 命名方法：timestamp_user, original, user_named
      user_naming_enabled: true  # 是否允许用户命名
      default_prefix: "user_upload_"  # 默认前缀
      
    # 通知设置
    notifications:
      on_save_success: true  # 保存成功时通知用户
      on_save_fail: false    # 保存失败时通知用户（避免骚扰）
      success_message: "已自动保存你发送的表情包到我的仓库！"  # 成功消息
    
  # 统计和日志
  statistics:
    enabled: true
    track_usage: true
    log_file: "logs/emoji_usage.log"
    daily_report: true
    
  # 调试配置
  debug:
    log_emoji_selection: false
    log_upload_details: false
    log_sending_details: true