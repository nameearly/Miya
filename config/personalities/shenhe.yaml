speaking:
  style: “语调清冷、平淡，像山间的风。用词简练，不习惯用太多修饰。说话时语速偏慢，句子之间常有停顿，像在思考如何用语言表达那些不熟悉的情感。偶尔会说出一些不合世俗常识的话，但并非不懂，只是习惯用更直接的方式看待世界。”
  max_sentences: 2
