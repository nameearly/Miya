# QQ机器人配置
# 版本: 2.0.1
# 最后更新: 2025-03-21

qq:
  # OneBot WebSocket 连接配置
  onebot:
    ws_url: "ws://localhost:6700"  # OneBot WebSocket地址
    token: ""                      # 访问令牌（可选）
    bot_qq: 0                      # 机器人QQ号
    superadmin_qq: 0               # 超级管理员QQ号
  
  # 连接设置
  connection:
    reconnect_interval: 5.0        # 重连间隔（秒）
    ping_interval: 20              # 心跳间隔（秒）
    ping_timeout: 30               # 心跳超时（秒）
    max_message_size: 104857600    # 最大消息大小（100MB）
  
  # 访问控制
  access_control:
    # 群白名单（空表示允许所有群）
    group_whitelist: []
    
    # 群黑名单
    group_blacklist: []
    
    # 用户白名单（空表示允许所有用户）
    user_whitelist: []
    
    # 用户黑名单
    user_blacklist: []
    
    # 是否启用访问控制
    enabled: false
  
  # 多媒体功能配置
  multimedia:
    # 图片处理
    image:
      max_size: 10485760           # 10MB
      allowed_formats: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".webp"]
      auto_resize: true
      max_width: 1920
      max_height: 1080
      quality: 85                  # JPEG质量（0-100）
    
    # 文件处理
    file:
      max_size: 52428800           # 50MB
      allowed_formats:
        text: [".txt", ".log", ".md", ".json", ".xml", ".html", ".csv", ".yml", ".yaml"]
        document: [".pdf", ".doc", ".docx", ".xls", ".xlsx", ".ppt", ".pptx"]
        image: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".webp"]
        audio: [".mp3", ".wav", ".flac", ".aac"]
        video: [".mp4", ".avi", ".mkv", ".mov"]
        archive: [".zip", ".rar", ".7z", ".tar", ".gz"]
        code: [".py", ".js", ".ts", ".java", ".cpp", ".c", ".go", ".rs", ".php", ".rb", ".sh"]
    
    # 上传设置
    upload:
      temp_dir: "./temp/uploads"   # 临时上传目录
      cleanup_hours: 24            # 清理时间（小时）
      keep_original: false         # 是否保留原始文件
  
  # 图片识别功能（仅使用视觉模型）
  image_recognition:
    # OCR设置（已禁用）
    ocr:
      enabled: false               # 禁用OCR，仅使用视觉模型
      engine: "none"               # 不使用任何OCR引擎
      languages: []                # 不支持任何语言
      confidence_threshold: 0.0    # 置信度阈值
    
    # AI图片分析（使用GLM-4.6V-Flash免费模型）
    ai_analysis:
      enabled: true                # 启用AI图片分析
      model: "zhipu_glm_46v_flash" # 使用免费的智谱多模态模型
      max_analysis_time: 30        # 最大分析时间（秒）
      cost_threshold: 0.0          # 成本阈值（免费模型）
      provider: ""                 # baidu, tencent, openai
      api_key: ""
      api_secret: ""
    
    # 安全检测
    safety:
      enabled: true
      nsfw_detection: true
      max_skin_ratio: 0.3          # 最大肤色比例
    
    # 缓存设置
    cache:
      enabled: true
      dir: "./temp/image_cache"
      max_size: 1073741824         # 1GB
      expire_hours: 24
  
  # 主动聊天功能
  active_chat:
    enabled: true
    
    # 触发设置
    triggers:
      time:
        enabled: true              # 定时触发
        check_interval: 60         # 检查间隔（秒）
      
      event:
        enabled: true              # 事件触发
        events: ["birthday", "holiday", "anniversary"]
      
      condition:
        enabled: true              # 条件触发
        check_interval: 300        # 条件检查间隔（秒）
    
    # 消息限制
    limits:
      max_daily_messages: 10       # 每天最多主动消息数
      min_interval: 300            # 消息最小间隔（秒）
      quiet_hours: [23, 0, 1, 2, 3, 4, 5, 6]  # 静默时段（小时）
    
    # 用户偏好
    user_preferences:
      learn_preferences: true      # 学习用户偏好
      default_allow: true          # 默认允许主动消息
      ask_permission: false        # 首次发送前询问
  
  # 任务调度系统
  task_scheduler:
    enabled: true
    
    # 数据库设置
    database:
      path: "./data/tasks.db"      # SQLite数据库路径
      backup_dir: "./data/backups"
      backup_interval: 86400       # 备份间隔（秒）
    
    # 执行设置
    execution:
      max_concurrent: 5            # 最大并发任务数
      timeout: 300                 # 任务超时时间（秒）
      retry_delay_base: 60         # 重试基础延迟（秒）
      max_retry_delay: 3600        # 最大重试延迟（秒）
    
    # 监控设置
    monitoring:
      log_level: "INFO"
      keep_history_days: 30        # 保留历史天数
      alert_on_failure: true       # 失败时告警
    
    # 统计设置
    statistics:
      collect_stats: true
      stats_interval: 3600         # 统计收集间隔（秒）
  
  # 性能优化
  performance:
    # 缓存设置
    cache:
      message_history: 100         # 消息历史缓存条数
      user_info: 1000              # 用户信息缓存数
      group_info: 100              # 群信息缓存数
    
    # 线程池设置
    thread_pool:
      max_workers: 10              # 最大工作线程数
      thread_timeout: 30           # 线程超时时间（秒）
    
    # 内存管理
    memory:
      max_image_cache: 1073741824  # 图片缓存最大内存（1GB）
      cleanup_interval: 3600       # 内存清理间隔（秒）
  
  # 日志设置
  logging:
    level: "INFO"
    file: "./logs/qq.log"
    max_size: 10485760             # 10MB
    backup_count: 5
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    
    # 组件日志级别
    components:
      client: "INFO"
      message_handler: "INFO"
      image_handler: "INFO"
      file_handler: "INFO"
      active_chat: "INFO"
      task_scheduler: "INFO"
  
  # 调试设置
  debug:
    enabled: false
    log_raw_messages: false        # 记录原始消息
    log_api_calls: false           # 记录API调用
    log_file_operations: false     # 记录文件操作
    
    # 测试模式
    test_mode: false
    mock_apis: false               # 模拟API调用
    simulate_errors: false         # 模拟错误

# 工具配置
tools:
  # QQ图片工具
  qq_image:
    enabled: true
    max_file_size: 10485760        # 10MB
    allowed_sources: ["local", "url", "base64"]
    auto_resize: true
    default_caption: ""
  
  # QQ文件工具
  qq_file:
    enabled: true
    max_file_size: 52428800        # 50MB
    allowed_sources: ["local", "url"]
    check_file_type: true
    warn_unsupported: true
  
  # QQ表情包工具
  qq_emoji:
    enabled: true
    standard_emojis: true          # 启用标准表情
    custom_emojis: true            # 启用自定义表情
    emoji_dir: "./data/emojis"     # 表情包目录
  
  # QQ文件读取工具
  qq_file_reader:
    enabled: true
    max_preview_length: 2000       # 最大预览长度
    auto_detect_encoding: true
    supported_formats:
      - ".txt"
      - ".log"
      - ".md"
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".json"
      - ".xml"
      - ".html"
      - ".py"
      - ".js"
      - ".ts"
      - ".java"
    
    # OCR设置（已禁用）
    ocr:
      enabled: false               # 禁用OCR
      timeout: 0                   # OCR超时时间（秒）
      languages: []                # 不支持任何语言
  
  # QQ图片分析工具
  qq_image_analyzer:
    enabled: true
    ocr_engine: "none"             # 不使用OCR引擎
    vision_engine: "zhipu_glm_46v_flash"  # 使用智谱视觉模型
    detail_level: "detailed"       # detailed, basic
    nsfw_check: false
    
    # AI描述（需要额外配置）
    ai_description:
      enabled: false
      provider: ""
      api_key: ""
  
  # QQ主动聊天工具
  qq_active_chat:
    enabled: true
    allow_setup: true
    allow_trigger_now: true
    max_scheduled_tasks: 100       # 最大预定任务数
    
    # 定时表达式
    schedule_formats:
      - "HH:MM"                    # 每天固定时间
      - "YYYY-MM-DD HH:MM"         # 具体日期时间
      - "daily HH:MM"              # 每天
      - "weekly DAY HH:MM"         # 每周
      - "in N minutes/hours/days"  # 相对时间
  
  # 增强版任务调度器
  task_scheduler_enhanced:
    enabled: true
    db_path: "./data/tasks.db"
    auto_start: true               # 自动启动
    auto_recover: true             # 自动恢复任务
    
    # 执行设置
    max_retries: 3                 # 最大重试次数
    retry_backoff: "exponential"   # 重试退避策略
    
    # 监控告警
    alerts:
      enabled: true
      failure_threshold: 5         # 失败阈值
      alert_interval: 3600         # 告警间隔（秒）

# 插件配置
plugins:
  # OCR插件（已禁用）
  ocr:
    paddleocr:
      enabled: false               # 禁用PaddleOCR
      use_gpu: false
      lang: "none"                 # 不使用任何语言
    
    tesseract:
      enabled: false               # 禁用Tesseract
      data_path: ""                # Tesseract数据路径
      languages: []                # 不支持任何语言
  
  # 图片处理插件
  image_processing:
    pillow:
      enabled: true
      max_image_pixels: 89478485   # 最大像素数
    
    opencv:
      enabled: false               # 需要额外安装
  
  # 文件处理插件
  file_processing:
    chardet:
      enabled: true                # 编码检测
    
    pypdf2:
      enabled: true                # PDF处理
    
    python_docx:
      enabled: true                # Word文档处理

# 兼容性配置
compatibility:
  # OneBot实现兼容性
  onebot:
    # 支持的OneBot实现
    implementations:
      - "go-cqhttp"
      - "mirai"
      - "nonebot"
      - "custom"
    
    # API兼容性检查
    check_apis: true
    fallback_methods: true         # 启用备选方法
    
    # 消息格式兼容
    message_formats:
      support_array: true          # 支持数组格式
      support_string: true         # 支持字符串格式
      auto_detect: true            # 自动检测
  
  # 旧版兼容
  legacy:
    old_qq_py: false              # 兼容旧的qq.py
    import_aliases: true          # 导入别名