# ============================================================
# 弥娅 MIYA - QQ 机器人统一配置
# 版本: 3.0.0
# 说明: 整合所有 QQ 相关配置到一个文件
# ============================================================

qq:
  # ===== 基础连接配置 =====
  connection:
    ws_url: "ws://localhost:6700"        # OneBot WebSocket 地址
    token: ""                             # 访问令牌（可选）
    bot_qq: 3681817929                              # 机器人 QQ 号
    superadmin_qq: 1523878699                      # 超级管理员 QQ 号
    reconnect_interval: 5.0               # 重连间隔（秒）
    ping_interval: 20                     # 心跳间隔（秒）
    ping_timeout: 30                      # 心跳超时（秒）
    max_message_size: 104857600           # 最大消息大小（100MB）

  # ===== 访问控制 =====
  access_control:
    enabled: false                        # 是否启用访问控制
    group_whitelist: []                   # 群白名单（空表示允许所有群）
    group_blacklist: []                   # 群黑名单
    user_whitelist: []                    # 用户白名单（空表示允许所有用户）
    user_blacklist: []                    # 用户黑名单

  # ===== 多媒体处理 =====
  multimedia:
    # 图片处理
    image:
      max_size: 10485760                  # 10MB
      allowed_formats: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".webp"]
      auto_resize: true
      max_width: 1920
      max_height: 1080
      quality: 85                         # JPEG 质量（0-100）

    # 文件处理
    file:
      max_size: 52428800                  # 50MB
      allowed_types:
        - txt
        - pdf
        - doc
        - docx
        - xls
        - xlsx
        - ppt
        - pptx
        - md
        - json
        - xml
        - html
        - csv
        - yml
        - yaml
        - py
        - js
        - ts
        - java
        - cpp
        - c
        - go
        - rs
        - php
        - rb
        - sh
        - log

    # 语音处理
    voice:
      enabled: false                      # 是否启用语音消息处理
      stt_enabled: false                  # 语音转文字（需要额外 API）

    # 上传设置
    upload:
      temp_dir: "./temp/uploads"          # 临时上传目录
      cleanup_hours: 24                   # 清理时间（小时）
      keep_original: false                # 是否保留原始文件

  # ===== 图片识别配置 =====
  image_recognition:
    # OCR 设置（已禁用，仅使用视觉模型）
    ocr:
      enabled: false
      engine: "none"
      languages: []
      confidence_threshold: 0.0

    # AI 图片分析（使用 GLM-4.6V-Flash 免费模型）
    ai_analysis:
      enabled: true
      model: "zhipu_glm_46v_flash"
      timeout: 30                         # 最大分析时间（秒）
      cost_threshold: 0.0                 # 成本阈值（免费模型）
      provider: ""                        # baidu, tencent, openai
      api_key: ""
      api_secret: ""

    # 安全检测
    safety:
      enabled: true
      nsfw_detection: true
      max_skin_ratio: 0.3                 # 最大肤色比例

    # 缓存设置
    cache:
      enabled: true
      dir: "./temp/image_cache"
      max_size: 1073741824                # 1GB
      expire_hours: 24

  # ===== 消息解析配置 =====
  message_parsing:
    enable_reply_parsing: true            # 是否启用引用消息解析
    enable_file_parsing: true             # 是否启用文件消息解析
    enable_media_detection: true          # 是否启用多媒体检测
    show_placeholder_in_text: true        # 是否在文本中显示引用/文件占位符

  # ===== 合并转发配置 =====
  forward:
    enable_parsing: true                  # 是否启用合并转发解析
    max_expand_depth: 3                   # 最大展开层数

  # ===== 功能开关 =====
  features:
    poke_reply: true                      # 戳一戳回复
    emoji_request: true                   # 表情包请求
    welcome_new_member: false             # 欢迎新成员
    scheduled_tasks: true                 # 定时任务
    passive_chat: true                    # 被动聊天（关键词触发）
    active_chat: true                     # 主动聊天

  # ===== 命令配置 =====
  commands:
    prefix: "/"                           # 命令前缀
    # 注意：命令关键词已移至 text_config.json 的 command_keywords
    # 注意：错误消息已移至 text_config.json 的 error_messages

  # ===== 任务调度 =====
  task_scheduler:
    enabled: true
    database:
      path: "./data/tasks.db"             # SQLite 数据库路径
      backup_dir: "./data/backups"
      backup_interval: 86400              # 备份间隔（秒）
    execution:
      max_concurrent: 5                   # 最大并发任务数
      timeout: 300                        # 任务超时时间（秒）
      retry_delay_base: 60                # 重试基础延迟（秒）
      max_retry_delay: 3600               # 最大重试延迟（秒）
    monitoring:
      log_level: "INFO"
      keep_history_days: 30               # 保留历史天数
      alert_on_failure: true              # 失败时告警
    statistics:
      collect_stats: true
      stats_interval: 3600                # 统计收集间隔（秒）

  # ===== 消息汇总窗口期配置 =====
  # 用于群聊中消息密集时，收集一段时间内的消息再统一回复
  message_batching:
    enabled: true                         # 是否启用消息汇总窗口
    window_seconds: 5                     # 窗口期时长（秒），收到新消息会重置计时
    max_window_seconds: 10                # 最大窗口期（防止无限等待）
    max_messages: 15                      # 窗口期内最大消息数量，超过则立即处理
    only_group: true                      # 是否仅对群聊生效（私聊始终即时回复）
    cooldown_seconds: 3                   # 两条消息间隔小于此时长才触发窗口期
    status_message: ""                    # 窗口期内的状态提示（留空则不发送）

  # ===== 消息队列配置 =====
  # 6车道优先级队列：superadmin/群超级管理员/私聊/群@/群普通/后台
  message_queue:
    enabled: true                         # 是否启用消息队列
    default_interval: 1.0                # 默认发车间隔（秒），越小越快响应
    # 各模型独立发车间隔（可选）
    model_intervals:
      default: 1.0
      # deepseek_v3: 0.5                  # deepseek模型可以设置更快
      # glm_4: 1.0                        # glm模型按默认

  # ===== 性能优化 =====
  performance:
    cache:
      message_history: 100                # 消息历史缓存条数
      user_info: 1000                     # 用户信息缓存数
      group_info: 100                     # 群信息缓存数
    thread_pool:
      max_workers: 10                     # 最大工作线程数
      thread_timeout: 30                  # 线程超时时间（秒）
    memory:
      max_image_cache: 1073741824         # 图片缓存最大内存（1GB）
      cleanup_interval: 3600              # 内存清理间隔（秒）

  # ===== 日志配置 =====
  logging:
    level: "INFO"
    file: "./logs/qq.log"
    max_size: 10485760                    # 10MB
    backup_count: 5
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
    log_message_detail: false             # 是否记录消息详情
    debug: false                          # 是否记录调试信息
    retention_days: 7                     # 日志保留天数

    # 组件日志级别
    components:
      client: "INFO"
      message_handler: "INFO"
      image_handler: "INFO"
      file_handler: "INFO"
      active_chat: "INFO"
      task_scheduler: "INFO"

  # ===== 调试设置 =====
  debug:
    enabled: false
    log_raw_messages: false               # 记录原始消息
    log_api_calls: false                  # 记录 API 调用
    log_file_operations: false            # 记录文件操作
    test_mode: false
    mock_apis: false                      # 模拟 API 调用
    simulate_errors: false                # 模拟错误

# ===== 工具配置 =====
tools:
  qq_image:
    enabled: true
    max_file_size: 10485760               # 10MB
    allowed_sources: ["local", "url", "base64"]
    auto_resize: true
    default_caption: ""

  qq_file:
    enabled: true
    max_file_size: 52428800               # 50MB
    allowed_sources: ["local", "url"]
    check_file_type: true
    warn_unsupported: true

  qq_emoji:
    enabled: true
    standard_emojis: true                 # 启用标准表情
    custom_emojis: true                   # 启用自定义表情
    emoji_dir: "./data/emoji"             # 表情包目录

  qq_file_reader:
    enabled: true
    max_preview_length: 2000              # 最大预览长度
    auto_detect_encoding: true
    supported_formats:
      - ".txt"
      - ".log"
      - ".md"
      - ".pdf"
      - ".doc"
      - ".docx"
      - ".json"
      - ".xml"
      - ".html"
      - ".py"
      - ".js"
      - ".ts"
      - ".java"
    ocr:
      enabled: false                      # 禁用 OCR
      timeout: 0                          # OCR 超时时间（秒）
      languages: []                       # 不支持任何语言

  qq_image_analyzer:
    enabled: true
    ocr_engine: "none"                    # 不使用 OCR 引擎
    vision_engine: "zhipu_glm_46v_flash"  # 使用智谱视觉模型
    detail_level: "detailed"              # detailed, basic
    nsfw_check: false
    ai_description:
      enabled: false
      provider: ""
      api_key: ""

  qq_active_chat:
    enabled: true
    allow_setup: true
    allow_trigger_now: true
    max_scheduled_tasks: 100              # 最大预定任务数
    schedule_formats:
      - "HH:MM"                           # 每天固定时间
      - "YYYY-MM-DD HH:MM"               # 具体日期时间
      - "daily HH:MM"                     # 每天
      - "weekly DAY HH:MM"               # 每周
      - "in N minutes/hours/days"        # 相对时间

  task_scheduler_enhanced:
    enabled: true
    db_path: "./data/tasks.db"
    auto_start: true                      # 自动启动
    auto_recover: true                    # 自动恢复任务
    max_retries: 3                        # 最大重试次数
    retry_backoff: "exponential"          # 重试退避策略
    alerts:
      enabled: true
      failure_threshold: 5                # 失败阈值
      alert_interval: 3600                # 告警间隔（秒）

# ===== 插件配置 =====
plugins:
  ocr:
    paddleocr:
      enabled: false                      # 禁用 PaddleOCR
      use_gpu: false
      lang: "none"                        # 不使用任何语言
    tesseract:
      enabled: false                      # 禁用 Tesseract
      data_path: ""
      languages: []

  image_processing:
    pillow:
      enabled: true
      max_image_pixels: 89478485          # 最大像素数
    opencv:
      enabled: false                      # 需要额外安装

  file_processing:
    chardet:
      enabled: true                       # 编码检测
    pypdf2:
      enabled: true                       # PDF 处理
    python_docx:
      enabled: true                       # Word 文档处理

# ===== 兼容性配置 =====
compatibility:
  onebot:
    implementations:                      # 支持的 OneBot 实现
      - "go-cqhttp"
      - "mirai"
      - "nonebot"
      - "custom"
    check_apis: true                      # API 兼容性检查
    fallback_methods: true                # 启用备选方法
    message_formats:
      support_array: true                 # 支持数组格式
      support_string: true                # 支持字符串格式
      auto_detect: true                   # 自动检测
  legacy:
    old_qq_py: false                      # 兼容旧的 qq.py
    import_aliases: true                  # 导入别名
